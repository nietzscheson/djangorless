version: '3.7'

services:
  djangorless:
    build:
      context: .
    container_name: djangorless
    volumes:
      - ./:/app
    working_dir: /app
    command: python manage.py runserver 0:8000
    ports:
      - 8000:8000
    environment:
      SECRET_KEY: ${SECRET_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
